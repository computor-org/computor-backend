services:
  forgejo:
    image: codeberg.org/forgejo/forgejo:15
    container_name: computor-forgejo
    environment:
      USER_UID: "1000"
      USER_GID: "1000"
      FORGEJO__security__INSTALL_LOCK: "true"
      FORGEJO__database__DB_TYPE: postgres
      FORGEJO__database__HOST: forgejo-postgres:5441
      FORGEJO__database__NAME: ${FORGEJO_DB_NAME:?}
      FORGEJO__database__USER: ${FORGEJO_DB_USER:?}
      FORGEJO__database__PASSWD: ${FORGEJO_DB_PASSWORD:?}
      FORGEJO__server__ROOT_URL: ${FORGEJO_ROOT_URL:?}
      FORGEJO__server__HTTP_PORT: "3030"
      FORGEJO__server__DOMAIN: ${FORGEJO_DOMAIN:?}
      FORGEJO__service__DISABLE_REGISTRATION: ${FORGEJO_DISABLE_REGISTRATION:?}
      FORGEJO__log__LEVEL: ${FORGEJO_LOG_LEVEL:?}
    ports:
      - "${FORGEJO_HTTP_PORT:?}:3030"
      - "127.0.0.1:${FORGEJO_SSH_PORT:?}:22"
    volumes:
      - ${FORGEJO_DATA_PATH:?}/forgejo:/data
    depends_on:
      forgejo-postgres:
        condition: service_healthy
      forgejo-bootstrap:
        condition: service_completed_successfully
    restart: unless-stopped

  forgejo-bootstrap:
    image: codeberg.org/forgejo/forgejo:15
    restart: "no"
    environment:
      USER_UID: "1000"
      USER_GID: "1000"
      FORGEJO__security__INSTALL_LOCK: "true"
      FORGEJO__database__DB_TYPE: postgres
      FORGEJO__database__HOST: forgejo-postgres:5441
      FORGEJO__database__NAME: ${FORGEJO_DB_NAME:?}
      FORGEJO__database__USER: ${FORGEJO_DB_USER:?}
      FORGEJO__database__PASSWD: ${FORGEJO_DB_PASSWORD:?}
      FORGEJO__server__ROOT_URL: ${FORGEJO_ROOT_URL:?}
      FORGEJO__server__DOMAIN: ${FORGEJO_DOMAIN:?}
      FORGEJO_ADMIN_USER: ${FORGEJO_ADMIN_USERNAME:?}
      FORGEJO_ADMIN_EMAIL: ${FORGEJO_ADMIN_EMAIL:?}
      FORGEJO_ADMIN_PASSWORD: ${FORGEJO_ADMIN_PASSWORD:?}
    volumes:
      - ${FORGEJO_DATA_PATH:?}/forgejo:/data
    depends_on:
      forgejo-postgres:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-ec"]
    command: |
      forgejo migrate

      forgejo admin user create \
        --username "$$FORGEJO_ADMIN_USER" \
        --password "$$FORGEJO_ADMIN_PASSWORD" \
        --email "$$FORGEJO_ADMIN_EMAIL" \
        --admin \
        --must-change-password=false \
        || true

  forgejo-postgres:
    image: postgres:16-alpine
    container_name: computor-forgejo-postgres
    environment:
      POSTGRES_DB: ${FORGEJO_DB_NAME:?}
      POSTGRES_USER: ${FORGEJO_DB_USER:?}
      POSTGRES_PASSWORD: ${FORGEJO_DB_PASSWORD:?}
      PGPORT: 5441
    ports:
      - "127.0.0.1:${FORGEJO_POSTGRES_PORT:?}:5441"
    volumes:
      - ${FORGEJO_DATA_PATH:?}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${FORGEJO_DB_USER} -p 5441"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
