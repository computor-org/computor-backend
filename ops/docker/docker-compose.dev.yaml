# Development-specific Docker Compose override
# Extends docker-compose.base.yaml with development services and configuration

services:
  # Traefik override for development — direct docker socket access (no proxy)
  traefik:
    command:
      - "--api.insecure=false"
      - "--providers.docker=true"
      - "--providers.docker.endpoint=unix:///var/run/docker.sock"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=computor-network"
      - "--entrypoints.web.address=:80"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
    volumes:
      - ${DOCKER_SOCKET_PATH:-/var/run/docker.sock}:/var/run/docker.sock:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Development API configuration (no container, runs locally)
  # Add this service when running API in a container for development

  # Temporal UI (only in development)
  temporal-ui:
    image: temporalio/ui:latest
    security_opt:
      - "no-new-privileges:true"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - computor-network
    container_name: computor-temporal-ui
    restart: unless-stopped
    ports:
      - "127.0.0.1:${TEMPORAL_UI_PORT:-8088}:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
    depends_on:
      - temporal
    labels:
      - "traefik.enable=false"

  # Temporal Worker (Development with Hot Reload)
  temporal-worker:
    build:
      context: ../../
      dockerfile: ./docker/temporal-worker/Dockerfile
    networks:
      - computor-network
    restart: unless-stopped
    security_opt:
      - "no-new-privileges:true"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      replicas: ${TEMPORAL_WORKER_REPLICAS:-1}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - TZ=UTC
      - RUNNING_IN_DOCKER=true
      - TEMPORAL_HOST=temporal
      - TEMPORAL_PORT=7233
      - TEMPORAL_NAMESPACE=default
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5437
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - DEBUG_MODE=${DEBUG_MODE}
      - TOKEN_SECRET=${TOKEN_SECRET}
      - SYSTEM_GIT_EMAIL=${SYSTEM_GIT_EMAIL:-worker@computor.local}
      - SYSTEM_GIT_NAME=${SYSTEM_GIT_NAME:-Computor Worker}
      - PYTHONPATH=/home/worker/computor-backend/src
      - API_URL=${API_URL}
      - API_ADMIN_EMAIL=${API_ADMIN_EMAIL}
      - API_ADMIN_PASSWORD=${API_ADMIN_PASSWORD}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:?must be set in .env}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:?must be set in .env}
      - MINIO_SECURE=false
      - GIT_SERVER=${GIT_SERVER}
      - GIT_SERVER_URL=${GIT_SERVER_URL_INTERNAL}
      - GIT_SERVER_ADMIN_USERNAME=${GIT_SERVER_ADMIN_USERNAME}
      - GIT_SERVER_ADMIN_PASSWORD=${GIT_SERVER_ADMIN_PASSWORD}
    volumes:
      - ${SYSTEM_DEPLOYMENT_PATH}/shared:${API_ROOT_PATH}/shared
    depends_on:
      - temporal
      - postgres
      - redis
      - minio
    labels:
      - "traefik.enable=false"

  # Unified Testing Worker - handles Python, Octave, R, Julia, C, Fortran, Document
  temporal-worker-testing:
    build:
      context: ../../
      dockerfile: ./docker/temporal-worker-testing/Dockerfile
    networks:
      - computor-network
    restart: unless-stopped
    security_opt:
      - "no-new-privileges:true"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    command: ["--queues=testing"]
    deploy:
      replicas: ${TESTING_WORKER_REPLICAS:-1}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - TZ=UTC
      - RUNNING_IN_DOCKER=true
      - TEMPORAL_HOST=temporal
      - TEMPORAL_PORT=7233
      - TEMPORAL_NAMESPACE=default
      - API_URL=${API_URL}
      - API_TOKEN=${TESTING_WORKER_TOKEN}
      # Default testing configuration (can be overridden by service.config)
      - TESTING_EXECUTABLE=computor-test
      # Extra pip packages installed into the test venv at worker startup
      # (see docker/temporal-worker-testing/testing-worker.py).
      # The Python version itself is fixed in the worker Dockerfile.
      - PYTHON_TEST_REQUIREMENTS=${PYTHON_TEST_REQUIREMENTS:-}
      # R configuration
      - R_LIBS_USER=/home/worker/.local/lib/R/library
    depends_on:
      - temporal
      - postgres
      - redis
    labels:
      - "traefik.enable=false"
