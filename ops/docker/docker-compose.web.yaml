# Web frontend (computor-web) Docker Compose overlay
# Adds the Next.js frontend service behind Traefik
# Included automatically in production mode by startup.sh

services:
  frontend:
    build:
      context: ../../
      dockerfile: ./docker/web/Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    networks:
      - computor-network
    restart: unless-stopped
    security_opt:
      - "no-new-privileges:true"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    depends_on:
      - uvicorn
      - traefik
    labels:
      - "traefik.enable=true"
      # Explicit service definition so both routers can reference it by name.
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"
      # Catch-all router (lowest priority — handles every path not claimed above).
      - "traefik.http.routers.frontend.rule=PathPrefix(`/`)"
      - "traefik.http.routers.frontend.entrypoints=web"
      - "traefik.http.routers.frontend.service=frontend"
      - "traefik.http.routers.frontend.priority=1"
      # /auth/success must reach the frontend, not Keycloak.
      # Path() is more specific than PathPrefix('/auth') so it wins automatically,
      # but an explicit priority makes the intent clear.
      - "traefik.http.routers.frontend-auth-success.rule=Path(`/auth/success`)"
      - "traefik.http.routers.frontend-auth-success.entrypoints=web"
      - "traefik.http.routers.frontend-auth-success.service=frontend"
      - "traefik.http.routers.frontend-auth-success.priority=20"
