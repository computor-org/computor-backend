# Forgejo git server add-on Docker Compose configuration
# Optional — include when GIT_SERVER=forgejo in .env
# Use together with base + dev/prod configuration
#
# Dev:  Forgejo available at http://localhost:${FORGEJO_PORT:-3030}
# Prod: Set FORGEJO_TRAEFIK_ENABLED=true and FORGEJO_DOMAIN in .env
#       Traefik then routes requests by host to this container on the shared network.
#
# On first start forgejo-bootstrap creates the admin user and (optionally)
# configures Keycloak OIDC automatically.

networks:
  forgejo-internal:
    driver: bridge
  computor-network:
    external: true

services:
  forgejo-db:
    image: postgres:16
    container_name: computor-forgejo-db
    networks:
      - forgejo-internal
    restart: unless-stopped
    security_opt:
      - "no-new-privileges:true"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    ports:
      - "127.0.0.1:${FORGEJO_DB_PORT:-5441}:5441"
    volumes:
      - ${SYSTEM_DEPLOYMENT_PATH}/forgejo/postgres:/var/lib/postgresql/data
    environment:
      TZ: UTC
      PGPORT: 5441
      POSTGRES_DB: forgejo
      POSTGRES_USER: forgejo
      POSTGRES_PASSWORD: ${FORGEJO_DB_PASSWORD:?}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forgejo -p 5441"]
      interval: 5s
      timeout: 5s
      retries: 5

  forgejo:
    image: codeberg.org/forgejo/forgejo:9
    container_name: computor-forgejo
    networks:
      - forgejo-internal
      - computor-network
    restart: unless-stopped
    security_opt:
      - "no-new-privileges:true"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    ports:
      - "127.0.0.1:${FORGEJO_PORT:-3030}:3030"
    volumes:
      - ${SYSTEM_DEPLOYMENT_PATH}/forgejo/data:/data
    environment:
      TZ: UTC
      # Skip the web installer (required for headless startup)
      FORGEJO__security__INSTALL_LOCK: "true"
      # Database
      FORGEJO__database__DB_TYPE: postgres
      FORGEJO__database__HOST: forgejo-db:5441
      FORGEJO__database__NAME: forgejo
      FORGEJO__database__USER: forgejo
      FORGEJO__database__PASSWD: ${FORGEJO_DB_PASSWORD:?}
      # Server
      FORGEJO__server__DOMAIN: ${FORGEJO_DOMAIN:-localhost}
      FORGEJO__server__HTTP_PORT: 3030
      FORGEJO__server__ROOT_URL: ${FORGEJO_ROOT_URL:-http://localhost:3030}
      FORGEJO__server__DISABLE_SSH: "true"
      # Registration: disabled — users are managed via API or Keycloak SSO
      FORGEJO__service__DISABLE_REGISTRATION: "true"
      # Allow OAuth2 SSO users to auto-create accounts (for Keycloak integration)
      FORGEJO__oauth2_client__ENABLE_AUTO_REGISTRATION: "true"
      FORGEJO__oauth2_client__UPDATE_AVATAR: "true"
      FORGEJO__oauth2_client__OPENID_CONNECT_SCOPES: "email profile"
      # Default repository visibility
      FORGEJO__repository__DEFAULT_PRIVATE: "true"
    labels:
      # Dev: traefik.enable=false — access via direct port binding (FORGEJO_PORT).
      # Prod: set FORGEJO_TRAEFIK_ENABLED=true and FORGEJO_DOMAIN in .env.
      #       Traefik then routes by Host header → this container on the shared network.
      - "traefik.enable=${FORGEJO_TRAEFIK_ENABLED:-false}"
      - "traefik.http.routers.forgejo.rule=Host(`${FORGEJO_DOMAIN:-localhost}`)"
      - "traefik.http.routers.forgejo.entrypoints=web"
      - "traefik.http.services.forgejo.loadbalancer.server.port=3030"
    depends_on:
      forgejo-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3030/api/healthz 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  # Runs once per `docker compose up` to create the admin user and configure OIDC.
  # Idempotent: forgejo returns non-zero if the user/auth-source exists, which is ignored.
  forgejo-bootstrap:
    image: codeberg.org/forgejo/forgejo:9
    container_name: computor-forgejo-bootstrap
    networks:
      - forgejo-internal
    restart: "no"
    volumes:
      - ${SYSTEM_DEPLOYMENT_PATH}/forgejo/data:/data
    environment:
      GITEA_WORK_DIR: /data
      FORGEJO_ADMIN_USERNAME: ${FORGEJO_ADMIN_USERNAME:?}
      FORGEJO_ADMIN_PASSWORD: ${FORGEJO_ADMIN_PASSWORD:?}
      FORGEJO_ADMIN_EMAIL: ${FORGEJO_ADMIN_EMAIL:-admin@computor.local}
      FORGEJO_KEYCLOAK_CLIENT_ID: ${FORGEJO_KEYCLOAK_CLIENT_ID:-}
      FORGEJO_KEYCLOAK_CLIENT_SECRET: ${FORGEJO_KEYCLOAK_CLIENT_SECRET:-}
      KEYCLOAK_URL: ${KEYCLOAK_PUBLIC_URL:-}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-computor}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        echo "Creating admin user '${FORGEJO_ADMIN_USERNAME}' (ignored if already exists)..."
        forgejo admin user create \
          --admin \
          --username "${FORGEJO_ADMIN_USERNAME}" \
          --password "${FORGEJO_ADMIN_PASSWORD}" \
          --email "${FORGEJO_ADMIN_EMAIL}" \
          --must-change-password=false 2>&1 || true

        if [ -n "${FORGEJO_KEYCLOAK_CLIENT_ID}" ] && [ -n "${KEYCLOAK_URL}" ]; then
          echo "Configuring Keycloak OIDC source..."
          forgejo admin auth add-oauth \
            --name Keycloak \
            --provider openidConnect \
            --key "${FORGEJO_KEYCLOAK_CLIENT_ID}" \
            --secret "${FORGEJO_KEYCLOAK_CLIENT_SECRET}" \
            --auto-discover-url "${KEYCLOAK_URL}/realms/${KEYCLOAK_REALM}/.well-known/openid-configuration" \
            --scopes "email profile" 2>&1 || true
        fi

        echo "Bootstrap complete."
    depends_on:
      forgejo:
        condition: service_healthy
