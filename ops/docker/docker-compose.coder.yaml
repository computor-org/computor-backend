# Coder addon Docker Compose configuration
# Optional services for Coder workspace management
# Use together with base + dev/prod configuration
#
# Code-server access is via Traefik at /coder/{username}/{workspace}/
# (configured in workspace Terraform template via Docker labels)

services:
  # Attach Traefik (defined in base) to the isolated workspace network so it
  # can route ingress to workspace containers, which no longer live on
  # computor-network. Compose merges this additively into the base service.
  # Workspaces set `traefik.docker.network=computor-coder-workspaces` so Traefik
  # dials them on this network despite the global --providers.docker.network pin.
  traefik:
    networks:
      - computor-coder-workspaces

  # Dedicated PostgreSQL database for Coder (separate from main DB)
  coder-postgres:
    image: postgres:16
    networks:
      - computor-network
    container_name: computor-coder-postgres
    restart: unless-stopped
    security_opt:
      - "no-new-privileges:true"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    ports:
      - "127.0.0.1:5439:5439"  # Different port from main postgres
    volumes:
      - ${SYSTEM_DEPLOYMENT_PATH}/coder-postgres:/var/lib/postgresql/data
    environment:
      TZ: UTC
      POSTGRES_USER: ${CODER_POSTGRES_USER:?must be set in .env}
      POSTGRES_PASSWORD: ${CODER_POSTGRES_PASSWORD:?must be set in .env}
      POSTGRES_DB: coder
      PGPORT: 5439
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CODER_POSTGRES_USER:?must be set in .env} -p 5439"]
      interval: 5s
      timeout: 5s
      retries: 5
    labels:
      - "traefik.enable=false"

  # Coder server (internal only - not exposed via Traefik)
  coder:
    image: ghcr.io/coder/coder:latest
    # Also on the isolated workspace network so the workspace agents can reach
    # coder:7080 (CODER_ACCESS_URL) without workspaces touching computor-network.
    networks:
      - computor-network
      - computor-coder-workspaces
    container_name: computor-coder
    restart: unless-stopped
    security_opt:
      - "no-new-privileges:true"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    ports:
      - "127.0.0.1:7080:7080"  # Expose for local API access
    environment:
      CODER_PG_CONNECTION_URL: "postgresql://${CODER_POSTGRES_USER:?must be set in .env}:${CODER_POSTGRES_PASSWORD:?must be set in .env}@coder-postgres:5439/coder?sslmode=disable"
      CODER_HTTP_ADDRESS: "0.0.0.0:7080"
      # Internal URL - used by Coder for agent binary downloads (must be reachable from workspace containers)
      CODER_ACCESS_URL: "http://coder:7080"
      # Note: Password auth must stay enabled for admin API operations (CoderClient._get_session_token).
      # This is safe because Coder's port 7080 is not exposed through Traefik - users can't reach it.
      CODER_DISABLE_PASSWORD_AUTH: ${CODER_DISABLE_PASSWORD_AUTH:-false}
      CODER_DISABLE_SESSION_EXPIRY_REFRESH: ${CODER_DISABLE_SESSION_EXPIRY_REFRESH:-false}
      CODER_TELEMETRY_ENABLE: ${CODER_TELEMETRY_ENABLE:-false}
    group_add:
      - "${DOCKER_GID}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${SYSTEM_DEPLOYMENT_PATH}/coder/home:/home/coder
      - ${SYSTEM_DEPLOYMENT_PATH}/coder/templates:/templates
    depends_on:
      coder-postgres:
        condition: service_healthy
      coder-registry:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7080/api/v2/buildinfo"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s
    labels:
      - "traefik.enable=false"

  # Local Docker registry for workspace images.
  #
  # Deliberately NOT attached to any shared network. Workspace containers live
  # on the isolated computor-coder-workspaces network and therefore can't reach
  # the registry over TCP and can't push poisoned images. The host docker daemon
  # still
  # reaches the registry via the 127.0.0.1:5000 port binding — sufficient
  # for both pushes (from temporal-worker-coder) and pulls (from terraform
  # at workspace creation), since both go through the docker socket.
  coder-registry:
    image: registry:2
    container_name: computor-coder-registry
    restart: unless-stopped
    security_opt:
      - "no-new-privileges:true"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    ports:
      - "127.0.0.1:${CODER_REGISTRY_PORT:-5000}:5000"
    volumes:
      - ${SYSTEM_DEPLOYMENT_PATH}/coder/registry:/var/lib/registry
    environment:
      REGISTRY_STORAGE_DELETE_ENABLED: "true"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5000/v2/"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Temporal worker for Coder tasks (image building, template pushing)
  # Triggered via API endpoints: POST /coder/admin/images/build, POST /coder/admin/templates/push
  temporal-worker-coder:
    build:
      context: ../../
      dockerfile: ./docker/temporal-worker-coder/Dockerfile
    networks:
      - computor-network
    restart: unless-stopped
    security_opt:
      - "no-new-privileges:true"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    volumes:
      - ${DOCKER_SOCKET_PATH:-/var/run/docker.sock}:/var/run/docker.sock
      - ${SYSTEM_DEPLOYMENT_PATH}/coder/templates:/templates:ro
    group_add:
      - "${DOCKER_GID}"
    environment:
      TEMPORAL_HOST: temporal
      TEMPORAL_PORT: 7233
      CODER_URL: http://coder:7080
      CODER_ENABLED: "true"
      CODER_ADMIN_EMAIL: ${CODER_ADMIN_EMAIL}
      CODER_ADMIN_PASSWORD: ${CODER_ADMIN_PASSWORD}
      CODER_TEMPLATES_DIR: /templates
      # localhost:5000 (not coder-registry:5000): the worker calls the host
      # docker daemon via the socket, so this name is resolved from the daemon's
      # perspective. localhost:5000 reaches the registry's port binding and is
      # also auto-treated by docker as an insecure (HTTP) registry, so no TLS.
      CODER_REGISTRY_HOST: localhost:5000
      DEBUG_MODE: ${DEBUG_MODE:-development}
      BACKEND_EXTERNAL_URL: ${BACKEND_EXTERNAL_URL:-http://host.docker.internal:8000}
      DEV_FORWARD_PORTS: ${DEV_FORWARD_PORTS:-}
      MATLAB_BASE_IMAGE: ${MATLAB_BASE_IMAGE:-matlab-base:latest}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      coder:
        condition: service_healthy

networks:
  # Isolated bridge for Coder workspace containers. Workspaces are untrusted —
  # the user has passwordless sudo — so they must NOT share computor-network
  # with the platform's databases, IdP (Keycloak), object store (MinIO), Redis,
  # Temporal, etc. Only Traefik (ingress) and the Coder server (agent
  # connections) are also attached here. computor-network itself is defined in
  # docker-compose.base.yaml and merged in at deploy time.
  computor-coder-workspaces:
    name: computor-coder-workspaces
    driver: bridge

