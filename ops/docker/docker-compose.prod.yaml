# Production-specific Docker Compose override
# Extends docker-compose.base.yaml with production services and configuration

services:
  # Restricted Docker API proxy. Traefik talks to this instead of the raw
  # socket, so a compromised Traefik can't drive arbitrary Docker actions.
  socket-proxy:
    image: tecnativa/docker-socket-proxy:0.3.0
    networks:
      - computor-network
    restart: unless-stopped
    security_opt:
      - "no-new-privileges:true"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    environment:
      CONTAINERS: "1"
      NETWORKS: "1"
      SERVICES: "1"
      TASKS: "1"
    volumes:
      - ${DOCKER_SOCKET_PATH:-/var/run/docker.sock}:/var/run/docker.sock:ro
    labels:
      - "traefik.enable=false"

  # Traefik override for production — Docker API via socket-proxy
  traefik:
    command:
      - "--api.insecure=false"
      - "--providers.docker=true"
      - "--providers.docker.endpoint=tcp://socket-proxy:2375"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=computor-network"
      - "--entrypoints.web.address=:80"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
    depends_on:
      - socket-proxy

  # Production API service
  # Prepare the analytics reporting-store directory (raw/duckdb/jobs) and hand
  # ownership to the API container's UID/GID before the backend starts. Runs
  # once and exits; the backend depends on its successful completion. Snapshots
  # are taken from this system's own postgres, so there is no source instance
  # or SSH tunnel to wire here.
  analytics-permissions:
    image: alpine:3.20
    security_opt:
      - "no-new-privileges:true"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    command:
      - sh
      - -c
      - |
        set -eu
        mkdir -p /analytics/raw /analytics/duckdb /analytics/jobs
        chown -R "${ANALYTICS_CONTAINER_UID:-1000}:${ANALYTICS_CONTAINER_GID:-1000}" /analytics
        chmod -R u+rwX,go-rwx /analytics
    volumes:
      - ${ANALYTICS_HOST_ROOT:-${SYSTEM_DEPLOYMENT_PATH}/analytics}:/analytics
    restart: "no"
    labels:
      - "traefik.enable=false"

  uvicorn:
    build:
      context: ../../
      dockerfile: ./docker/api/Dockerfile
    networks:
      - computor-network
    restart: unless-stopped
    security_opt:
      - "no-new-privileges:true"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    command: ["sh", "startup.bash"]
    volumes:
      - ${SYSTEM_DEPLOYMENT_PATH}/shared:${API_ROOT_PATH}/shared
      # Documents tree shared with static-server (which mounts the same host
      # path read-only). Same path inside the container as outside so
      # ``settings.DOCUMENTS_ROOT`` resolves consistently in both processes.
      - ${DOCUMENTS_ROOT:-${SYSTEM_DEPLOYMENT_PATH}/shared/documents}:${DOCUMENTS_ROOT:-/opt/computor/shared/documents}
      # Analytics reporting store (Parquet snapshots + DuckDB + job JSON),
      # prepared by the analytics-permissions init service above.
      - ${ANALYTICS_HOST_ROOT:-${SYSTEM_DEPLOYMENT_PATH}/analytics}:${ANALYTICS_ROOT:-/srv/computor/analytics}
    ports:
      - "127.0.0.1:${API_PORT:-8000}:8000"
    environment:
      TZ: UTC
      RUNNING_IN_DOCKER: true
      API_ADMIN_USER: ${API_ADMIN_USER}
      API_ADMIN_PASSWORD: ${API_ADMIN_PASSWORD}
      API_LOCAL_STORAGE_DIR: ${API_LOCAL_STORAGE_DIR}
      DOCUMENTS_ROOT: ${DOCUMENTS_ROOT:-/opt/computor/shared/documents}
      DOCUMENTS_MAX_FILE_SIZE: ${DOCUMENTS_MAX_FILE_SIZE:-10485760}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5437
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      DEBUG_MODE: ${DEBUG_MODE}
      TOKEN_SECRET: ${TOKEN_SECRET}
      TEMPORAL_HOST: temporal
      TEMPORAL_PORT: 7233
      TEMPORAL_NAMESPACE: default
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:?must be set in .env}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?must be set in .env}
      MINIO_SECURE: false
      MINIO_MAX_UPLOAD_SIZE: ${MINIO_MAX_UPLOAD_SIZE:-10485760}
      EXTENSION_PUBLIC_DOWNLOAD_URL: ${EXTENSION_PUBLIC_DOWNLOAD_URL}
      EXTENSION_GETTING_STARTED_URL: ${EXTENSION_GETTING_STARTED_URL}
      # Coder integration (if enabled)
      CODER_ENABLED: ${CODER_ENABLED:-false}
      CODER_URL: ${CODER_URL}
      CODER_WORKSPACE_BASE_URL: ${CODER_WORKSPACE_BASE_URL:-}
      CODER_ADMIN_EMAIL: ${CODER_ADMIN_EMAIL}
      CODER_ADMIN_PASSWORD: ${CODER_ADMIN_PASSWORD}
      CODER_ADMIN_API_SECRET: ${CODER_ADMIN_API_SECRET}
      BACKEND_EXTERNAL_URL_PROD: ${BACKEND_EXTERNAL_URL_PROD:-}
      # Analytics reporting store. Snapshots are taken from THIS system's own
      # postgres: ANALYTICS_SOURCE_DATABASE_URL is left blank and the backend
      # defaults it to its own POSTGRES_* connection (read-only transaction).
      # Set it only to override with e.g. a dedicated read-only role.
      ANALYTICS_ROOT: ${ANALYTICS_ROOT:-/srv/computor/analytics}
      ANALYTICS_SOURCE_NAME: ${ANALYTICS_SOURCE_NAME:-green}
      ANALYTICS_SOURCE_DATABASE_URL: ${ANALYTICS_SOURCE_DATABASE_URL:-}
      ANALYTICS_EXPORT_CHUNK_SIZE: ${ANALYTICS_EXPORT_CHUNK_SIZE:-100000}
      # Optional example-source viewer (points at this backend's own API):
      ANALYTICS_SOURCE_API_URL: ${ANALYTICS_SOURCE_API_URL:-}
      ANALYTICS_SOURCE_API_TOKEN: ${ANALYTICS_SOURCE_API_TOKEN:-}
      # Optional CLI/cron refresh (python -m computor_backend.scripts.analytics_refresh):
      ANALYTICS_REFRESH_COURSE_ID: ${ANALYTICS_REFRESH_COURSE_ID:-}
      ANALYTICS_REFRESH_SOURCE_NAME: ${ANALYTICS_REFRESH_SOURCE_NAME:-green}
      ANALYTICS_REFRESH_REQUESTED_BY_USER_ID: ${ANALYTICS_REFRESH_REQUESTED_BY_USER_ID:-ops}
      ANALYTICS_REFRESH_SUBMISSION_CUTOFF: ${ANALYTICS_REFRESH_SUBMISSION_CUTOFF:-}
      ANALYTICS_REFRESH_GRADING_CUTOFF: ${ANALYTICS_REFRESH_GRADING_CUTOFF:-}
      ANALYTICS_REFRESH_TABLES: ${ANALYTICS_REFRESH_TABLES:-}
    depends_on:
      postgres:
        condition: service_started
      minio:
        condition: service_started
      redis:
        condition: service_started
      temporal:
        condition: service_started
      analytics-permissions:
        condition: service_completed_successfully
    labels:
      - "traefik.enable=true"
      # Service definition (required for proper routing)
      - "traefik.http.services.uvicorn.loadbalancer.server.port=8000"
      # HTTP API router
      - "traefik.http.routers.uvicorn.rule=PathPrefix(`/api`)"
      - "traefik.http.routers.uvicorn.entrypoints=web"
      - "traefik.http.routers.uvicorn.service=uvicorn"
      - "traefik.http.middlewares.uvicorn-stripprefix.stripprefix.prefixes=/api"
      - "traefik.http.routers.uvicorn.middlewares=uvicorn-stripprefix"

  # Frontend: see docker-compose.web.yaml (included automatically in prod)

  # Temporal Worker (Production)
  temporal-worker:
    build:
      context: ../../
      dockerfile: ./docker/temporal-worker-dev/Dockerfile
    networks:
      - computor-network
    restart: unless-stopped
    security_opt:
      - "no-new-privileges:true"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      replicas: ${TEMPORAL_WORKER_REPLICAS:-2}
    environment:
      - TZ=UTC
      - RUNNING_IN_DOCKER=true
      - TEMPORAL_HOST=temporal
      - TEMPORAL_PORT=7233
      - TEMPORAL_NAMESPACE=default
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5437
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - DEBUG_MODE=${DEBUG_MODE}
      - TOKEN_SECRET=${TOKEN_SECRET}
      - SYSTEM_GIT_EMAIL=${SYSTEM_GIT_EMAIL:-worker@computor.local}
      - SYSTEM_GIT_NAME=${SYSTEM_GIT_NAME:-Computor Worker}
      - PYTHONPATH=/home/worker/computor-backend/src
      - API_URL=${API_URL}
      - API_ADMIN_USER=${API_ADMIN_USER}
      - API_ADMIN_PASSWORD=${API_ADMIN_PASSWORD}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:?must be set in .env}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:?must be set in .env}
      - MINIO_SECURE=false
      - API_LOCAL_STORAGE_DIR=${API_LOCAL_STORAGE_DIR}
    volumes:
      - ${SYSTEM_DEPLOYMENT_PATH}/shared:${API_ROOT_PATH}/shared
    depends_on:
      - temporal
      - postgres
      - redis
      - minio
    labels:
      - "traefik.enable=false"

  # Unified Testing Worker
  temporal-worker-testing:
    build:
      context: ../../
      dockerfile: ./docker/temporal-worker-testing/Dockerfile
    networks:
      - computor-network
    restart: unless-stopped
    security_opt:
      - "no-new-privileges:true"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    command: ["--queues=testing"]
    deploy:
      replicas: ${TESTING_WORKER_REPLICAS:-2}
    environment:
      - TZ=UTC
      - RUNNING_IN_DOCKER=true
      - TEMPORAL_HOST=temporal
      - TEMPORAL_PORT=7233
      - TEMPORAL_NAMESPACE=default
      - API_URL=${API_URL}
      - API_TOKEN=${TESTING_WORKER_TOKEN}
      # Python version is baked into the worker Dockerfile; only the extra
      # pip packages are runtime-configurable.
      - PYTHON_TEST_REQUIREMENTS=${PYTHON_TEST_REQUIREMENTS:-}
      - R_LIBS_USER=/home/worker/.local/lib/R/library
    depends_on:
      - temporal
      - postgres
      - redis
      - minio
    labels:
      - "traefik.enable=false"

  # MATLAB Testing Worker
  temporal-worker-matlab:
    build:
      context: ../../
      dockerfile: ./docker/temporal-worker-matlab/Dockerfile
      args:
        MATLAB_BASE_IMAGE: ${MATLAB_BASE_IMAGE:-matlab-base:latest}
    networks:
      - computor-network
    restart: unless-stopped
    security_opt:
      - "no-new-privileges:true"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    command: ["--queues=testing-matlab"]
    init: true  # Use tini as PID 1 to properly reap zombie processes
    deploy:
      replicas: ${MATLAB_TESTING_WORKER_REPLICAS:-1}
    environment:
      - TZ=UTC
      - RUNNING_IN_DOCKER=true
      - TEMPORAL_HOST=temporal
      - TEMPORAL_PORT=7233
      - TEMPORAL_NAMESPACE=default
      - PYTHONPATH=/home/matlab/computor-backend/src
      - API_URL=${API_URL}
      - API_TOKEN=${MATLAB_WORKER_TOKEN}
      - MATLAB_TEST_ENGINE_URL=${MATLAB_TEST_ENGINE_URL}
      - MATLAB_TEST_ENGINE_TOKEN=${MATLAB_TEST_ENGINE_TOKEN}
      - MATLAB_TEST_ENGINE_VERSION=${MATLAB_TEST_ENGINE_VERSION}
      - MLM_LICENSE_FILE=${MATLAB_MLM_LICENSE_FILE}
    depends_on:
      - temporal
      - postgres
      - redis
      - minio
    ulimits:
      nproc: 2048       # Limit number of processes (MATLAB needs more)
      nofile:
        soft: 8192      # Limit file descriptors
        hard: 16384
    pids_limit: 2048    # Limit total PIDs (MATLAB spawns many subprocesses)
    labels:
      - "traefik.enable=false"

  # No Temporal UI in production (commented out)
  # temporal-ui: