name: web-e2e

# Typecheck + the mocked Playwright suite for computor-web. Fully hermetic
# (the backend is mocked at the network layer), so it runs on every PR.
on:
  pull_request:
    branches: [main, "release/**"]
    paths: ["computor-web/**"]
  workflow_dispatch:

jobs:
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: computor-web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: computor-web/yarn.lock

      - run: yarn install --frozen-lockfile

      - name: Typecheck
        run: yarn typecheck

      - name: Install Playwright chromium
        run: yarn playwright install --with-deps chromium

      - name: e2e (mocked)
        run: yarn test:e2e

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: computor-web/playwright-report
          retention-days: 7
