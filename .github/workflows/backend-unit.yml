name: backend-unit

# Hermetic backend unit tests (the `unit`-marked subset — no DB/services).
# Broader hermetic coverage is pending the P6 marker sweep; until then this gate
# runs the ~64 unit-marked tests.
#
# NOTE: the editable-install lines below are a starting point — the first CI run
# may need the exact sibling-package set / extras tuned.
on:
  pull_request:
    branches: [main, "release/**"]
    paths: ["computor-backend/**", "computor-types/**", "computor-client/**"]
  workflow_dispatch:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          pip install -e computor-types -e computor-client -e computor-utils
          pip install -e computor-backend

      - name: Unit tests (hermetic)
        working-directory: computor-backend/src
        run: python -m pytest -m unit
