[pytest]
# Configuration for pytest
testpaths = computor_backend/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Add src to Python path
pythonpath = .

# Test discovery
addopts =
    -v
    --tb=short
    --strict-markers
    --color=yes
    # Default run is hermetic: it excludes the out-of-scope Coder feature, live
    # Keycloak, and every test that needs live Postgres/Redis/MinIO (integration
    # /docker). Run those explicitly with `-m integration` / `-m docker` /
    # `-m keycloak` / `-m coder` (a CLI -m overrides this default).
    -m "not coder and not keycloak and not integration and not docker"

# Markers
markers =
    unit: Unit tests that don't require database
    integration: Integration tests that require database or Docker services
    slow: Tests that take a long time to run
    asyncio: Async tests
    docker: Tests that require Docker Compose services to be running
    keycloak: Tests that require a live Keycloak server
    coder: Tests for the Coder workspace feature (excluded from testing scope; run with -m coder)