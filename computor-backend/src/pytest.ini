[pytest]
# Configuration for pytest
testpaths = computor_backend/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Add src to Python path
pythonpath = .

# Test discovery
addopts =
    -v
    --tb=short
    --strict-markers
    --color=yes
    # Default run excludes the out-of-scope Coder feature and live-Keycloak tests.
    # Run them explicitly with `-m coder` / `-m keycloak` (a CLI -m overrides this).
    -m "not coder and not keycloak"

# Markers
markers =
    unit: Unit tests that don't require database
    integration: Integration tests that require database or Docker services
    slow: Tests that take a long time to run
    asyncio: Async tests
    docker: Tests that require Docker Compose services to be running
    keycloak: Tests that require a live Keycloak server
    coder: Tests for the Coder workspace feature (excluded from testing scope; run with -m coder)