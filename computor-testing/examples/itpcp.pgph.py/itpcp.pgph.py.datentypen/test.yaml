type: python
name: Python Test Suite
description: Checks subtests and graphics
version: '1.0'
properties:
  failureMessage: Some or all tests failed
  successMessage: Congratulations! All tests passed
  qualification: verifyEqual
  relativeTolerance: 1.0e-12
  absoluteTolerance: 0.0001
  allowedOccuranceRange:
  - 0
  - 0
  occuranceType: NAME
  typeCheck: true
  shapeCheck: true
  timeout: 180.0
  tests:
  - type: variable
    name: variables
    entryPoint: datentypen.py
    tests:
    - name: a
    - name: b
    - name: c
    - name: d
    - name: e
    - name: f
    - name: typ_a
    - name: typ_b
    - name: typ_c
    - name: typ_d
    - name: typ_e
    - name: typ_f
    - name: char_a
    - name: char_b
    - name: char_c
    - name: char_d
    - name: char_e
    - name: char_f
    - name: wort
    - name: cast_test1
    - name: cast_test2
    - name: cast_test3
    - name: cast_test4
    - name: cast_test5
    - name: p1_plus_p2
    - name: p1_plus_p3
    - name: p1_plus_p4
    - name: pos_var_1
    - name: pos_var_2
    - name: pos_var_3
    - name: pos_var_4
  - type: stdout
    name: printtest1
    entryPoint: datentypen.py
    tests:
    - name: stdout1
