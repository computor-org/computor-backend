name: Simple Computations (Julia)
description: CodeAbility TestSuite for Julia
type: julia
version: "1.0"

properties:
  relativeTolerance: 1.0e-12
  absoluteTolerance: 0.0001
  ignoreClass: false
  failureMessage: Some or all tests failed
  successMessage: Congratulations! All tests passed
  tests:

    - type: exist
      name: Checks existence of file simple_computations.jl
      file: simple_computations.jl
      id: exist_simple_computations
      tests:
        - name: existence

    - type: variable
      name: Initialization of basic variables
      id: simple_computations
      entryPoint: simple_computations.jl
      successDependency: [exist_simple_computations]
      tests:
        - name: a
        - name: b
        - name: x
        - name: y

    - type: variable
      name: Some arithmetic operations
      id: "2"
      entryPoint: simple_computations.jl
      successDependency: [exist_simple_computations]
      tests:
        - name: v_ax
        - name: v_by
        - name: sum_1
        - name: sum_2
        - name: sub_1
        - name: prod_1
        - name: quot_1
        - name: quot_2
        - name: pot_1
        - name: pot_2

    - type: variable
      name: Roots, exponentials, and logarithm
      id: "3"
      entryPoint: simple_computations.jl
      successDependency: [exist_simple_computations]
      tests:
        - name: root_1
        - name: root_2
          relativeTolerance: 1e-15
        - name: expo_1
        - name: expo_2
        - name: log_1
        - name: log_2

    - type: variable
      name: Trigonometric functions
      id: "4"
      entryPoint: simple_computations.jl
      successDependency: [exist_simple_computations]
      tests:
        - name: trig_1
        - name: trig_2
        - name: trig_3
        - name: trig_4

    - type: structural
      name: Structural test for file simple_computations.jl
      file: simple_computations.jl
      id: structural_simple_computations
      successDependency: exist_simple_computations
      tests:
        - name: exp_function
          pattern: "exp\\."
          allowedOccuranceRange: [1, 0]
        - name: sqrt_function
          pattern: "sqrt\\."
          allowedOccuranceRange: [1, 0]
        - name: no_for_loops
          pattern: "\\bfor\\b"
          allowedOccuranceRange: [0, 0]
        - name: no_while_loops
          pattern: "\\bwhile\\b"
          allowedOccuranceRange: [0, 0]
        - name: no_if_statements
          pattern: "\\bif\\b"
          allowedOccuranceRange: [0, 0]
